apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-network-policy
  namespace: rails-app
spec:
  podSelector:
    matchLabels:
      app: postgres
      tier: database
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: rails
          tier: api
    ports:
    - protocol: TCP
      port: 5432
  policyTypes:
  - Ingress

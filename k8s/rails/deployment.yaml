apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app
  namespace: rails-app
  labels:
    app: rails
    tier: api
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rails
      tier: api
  template:
    metadata:
      labels:
        app: rails
        tier: api
    spec:
      containers:
      - name: rails
        image: yourusername/rails-k8s-app:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: DB_NAME
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: rails-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rails-secrets
              key: DB_PASSWORD
        - name: RAILS_ENV
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: RAILS_ENV
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: rails-secrets
              key: SECRET_KEY_BASE
        - name: RAILS_LOG_TO_STDOUT
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: RAILS_LOG_TO_STDOUT
        - name: RAILS_MAX_THREADS
          valueFrom:
            configMapKeyRef:
              name: rails-config
              key: RAILS_MAX_THREADS
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 30
      restartPolicy: Always

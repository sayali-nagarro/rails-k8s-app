apiVersion: v1
kind: ConfigMap
metadata:
  name: rails-config
  namespace: rails-app
data:
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: rails_k8s_app_production
  RAILS_ENV: production
  RAILS_MAX_THREADS: "5"
  RAILS_LOG_TO_STDOUT: "true"
  API_URL: "http://rails-service:3000"
  # Application specific config
  APP_NAME: "Rails K8s App"
  APP_VERSION: "1.0.0"
